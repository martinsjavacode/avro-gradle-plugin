name: Release Gradle Plugin

on:
  workflow_dispatch:
    inputs:
      publishOnly:
        description: 'Only Publish the plugin to the Gradle Plugin Portal'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 21

      - name: Gradle Wrapper Validation
        uses: gradle/actions/wrapper-validation@v6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build with Gradle
        run: ./gradlew test jacocoTestReport

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          file: ./build/reports/jacoco/test/jacocoTestReport.xml
          flags: release
          name: codecov-release
          token: ${{ secrets.CODECOV_TOKEN }}

  bump-version:
    runs-on: ubuntu-latest
    needs: test
    if: inputs.publishOnly == false
    permissions:
      contents: write
      issues: write
    outputs:
      version: ${{ env.REVISION }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-tags: 'true'
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Create bump and changelog
        uses: commitizen-tools/commitizen-action@master
        with:
          github_token: ${{ steps.app-token.outputs.token }}

  publish:
    runs-on: ubuntu-latest
    needs:
      - test
      - bump-version
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: v${{ needs.bump-version.outputs.version }}

      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 21

      - name: Gradle Wrapper Validation
        uses: gradle/actions/wrapper-validation@v6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish Plugin to Gradle Plugin Portal
        run: ./gradlew publishPlugins
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
